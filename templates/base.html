<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="黑土智耕 - 东北小农户保护性耕作AI全流程服务平台"
    />
    <title>
      {% block title %}黑土智耕 - 东北小农户保护性耕作AI服务{% endblock %}
    </title>
    <link
      rel="stylesheet"
      href="{{ url_for('static', filename='css/style.css') }}"
    />
    {% block extra_css %}{% endblock %}
  </head>
  <body>
    <div class="page-wrapper">
      <!-- Header -->
      <header class="header">
        <div class="container">
          <div class="header-content">
            <a href="/" class="logo">
              <div class="logo-icon">🌾</div>
              <div class="logo-text">
                <h1>黑土智耕</h1>
                <span>东北小农户AI服务平台</span>
              </div>
            </a>

            <button class="mobile-menu-btn" onclick="toggleMobileMenu()">
              ☰
            </button>

            <nav class="nav" id="mainNav">
              <a
                href="/"
                class="nav-link {% if request.endpoint == 'index' %}active{% endif %}"
              >
                <span>🏠</span> 首页
              </a>
              <a
                href="/diagnosis"
                class="nav-link {% if request.endpoint == 'diagnosis' %}active{% endif %}"
              >
                <span>🔬</span> 黑土快诊
              </a>
              <a
                href="/calendar"
                class="nav-link {% if request.endpoint == 'calendar' %}active{% endif %}"
              >
                <span>📅</span> 农艺管家
              </a>
              <a
                href="/pest"
                class="nav-link {% if request.endpoint == 'pest' %}active{% endif %}"
              >
                <span>🐛</span> 病虫识别
              </a>
              <a
                href="/community"
                class="nav-link {% if request.endpoint == 'community' %}active{% endif %}"
              >
                <span>👥</span> 农友社区
              </a>
            </nav>
          </div>
        </div>
      </header>

      <!-- Main Content -->
      <main class="main-content">{% block content %}{% endblock %}</main>
    </div>

    <script>
      // Mobile menu toggle
      function toggleMobileMenu() {
        const nav = document.getElementById("mainNav");
        nav.classList.toggle("active");
      }

      // Close mobile menu on resize
      window.addEventListener("resize", function () {
        if (window.innerWidth > 768) {
          document.getElementById("mainNav").classList.remove("active");
        }
      });
    </script>
    {% block extra_js %}{% endblock %}
  </body>
</html>
